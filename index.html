<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DhikrFlow - Online Dhikr Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="card">
        <h1><span class="white">Dhikr</span><span class="green">Flow</span></h1>

        <div class="zikr-card">
            <button id="z1" class="zikr">SubhanAllah</button>
            <button id="z2" class="zikr">Alhamdulillah</button>
            <button id="z3" class="zikr">Allahu Akbar</button>
            <button id="z4" class="zikr">Astagfirullah</button>
            <button id="z5" class="zikr">La ilaha illa Allah</button>
        </div>

        <div class="zikr-info">
            <h3 id="showZikr"></h3>
            <p id="showMeaning"></p>
        </div>

        <p id="showStatus"></p>
        <p id="showCount">0</p>
        <h3 id="showTarget">Target: 0</h3>
        
        <button id="count">COUNT</button>
    </div>
    <footer>© 2026 DhikrFlow. All rights reserved by Golam Aif Ahnaf</footer>

</body>

<script src="script.js"></script>
</html>
